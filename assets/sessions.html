<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sessions — Proxy Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0d1117; color: #c9d1d9; line-height: 1.5;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  a { color: #58a6ff; text-decoration: none; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; border-bottom: 1px solid #21262d; background: #161b22; max-height: 40px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    margin-right: 8px; background: #f85149; vertical-align: middle;
  }
  .status-dot.connected { background: #3fb950; }
  .status-label { font-size: 13px; color: #8b949e; }

  /* Session tabs */
  .tabs {
    display: flex; gap: 4px; padding: 8px 20px; border-bottom: 1px solid #21262d;
    background: #161b22; overflow-x: auto; flex-shrink: 0;
  }
  .tab {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
    border: 1px solid #30363d; background: #0d1117; color: #8b949e;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .tab:hover { border-color: #58a6ff; color: #c9d1d9; }
  .tab.active { border-color: #58a6ff; color: #c9d1d9; background: #161b22; }
  .tab-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #484f58;
    flex-shrink: 0;
  }
  .tab-dot.active {
    background: #3fb950;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63,185,80,0.5); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(63,185,80,0); }
  }

  /* Instrument panel */
  .instruments {
    display: flex; gap: 2px; padding: 8px 16px;
    background: #0d1117; border-bottom: 1px solid #21262d;
    flex-shrink: 0; overflow-x: auto;
  }
  .gauge {
    flex: 1; min-width: 160px; padding: 6px 12px;
    background: #161b22; border-radius: 6px; font-size: 11px;
  }
  .gauge-label { color: #8b949e; margin-bottom: 2px; }
  .gauge-value { font-size: 14px; font-weight: 600; color: #e6edf3; }
  .gauge-detail { font-size: 10px; color: #6e7681; margin-top: 1px; }
  .gauge-bar { height: 4px; border-radius: 2px; background: #21262d; margin-top: 4px; overflow: hidden; }
  .gauge-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .gauge-bar-fill.green { background: #3fb950; }
  .gauge-bar-fill.yellow { background: #d29922; }
  .gauge-bar-fill.red { background: #f85149; }

  /* Main content area */
  .content {
    flex: 1; overflow-y: auto; padding: 16px 20px; width: 100%;
    margin: 0 auto;
  }

  /* Request card */
  .request-card {
    border: 1px solid #21262d; border-radius: 6px; margin-bottom: 12px;
    background: #161b22; overflow: hidden;
    border-top: 1px solid #30363d;
  }
  .request-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    font-size: 13px; cursor: pointer; flex-wrap: wrap;
  }
  .request-header:hover { background: #1c2128; }
  .req-time { color: #8b949e; font-size: 12px; flex-shrink: 0; }
  .req-model {
    background: #1f6feb33; color: #58a6ff; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .req-message { color: #c9d1d9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .req-cost { color: #8b949e; font-size: 12px; flex-shrink: 0; }
  .req-tokens { color: #8b949e; font-size: 11px; flex-shrink: 0; }
  .req-error { color: #f85149; }

  /* Thinking block */
  .thinking-block {
    margin: 8px 14px; padding: 10px 14px; border-radius: 6px;
    background: #1c1c2e; border-left: 3px solid #2d2d44;
    overflow-y: auto;
  }
  .thinking-block.streaming { border-left-color: #8957e5; }
  .thinking-label {
    font-size: 11px; font-weight: 700; color: #8957e5; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .thinking-text {
    font-size: 13px; color: #b392f0; white-space: pre-wrap; word-break: break-word;
    font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }

  /* Response block */
  .response-block {
    margin: 8px 14px; padding: 10px 14px; border-radius: 6px;
    background: #0d1117; border: 1px solid #21262d;
    overflow-y: auto;
  }
  .response-text {
    font-size: 13px; white-space: pre-wrap; word-break: break-word;
    font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }

  /* Tool call */
  .tool-call {
    margin: 4px 14px; padding: 8px 12px; border-radius: 4px;
    background: #0d1117; border: 1px solid #21262d; font-size: 12px; line-height: 1.6;
  }
  .tool-name {
    color: #d2a8ff; font-weight: 600; margin-right: 8px;
  }
  .tool-input { color: #8b949e; font-family: monospace; font-size: 11px; }

  /* Subagent group */
  .subagent-group {
    margin-left: 20px; border-left: 2px solid #1f6feb; padding-left: 12px;
    margin-bottom: 10px;
  }
  .subagent-label {
    font-size: 12px; color: #58a6ff; font-weight: 600; margin: 8px 0 4px 0;
  }

  /* Session summary */
  .session-summary {
    font-size: 12px; color: #8b949e; padding: 4px 0 8px 0;
    display: flex; gap: 14px;
  }

  /* Expandable sections */
  .expandable { display: none; padding-bottom: 10px; }
  .expandable.open { display: block; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 60px 20px; color: #484f58;
  }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #8b949e; }

  /* Streaming indicator */
  .streaming-indicator {
    display: inline-block; width: 6px; height: 14px;
    background: #8957e5; margin-left: 4px; vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* --- New QoL styles --- */
  .badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-left: 4px; color: #0d1117; }
  .tool-call-rich { display: flex; align-items: baseline; gap: 6px; padding: 4px 8px; margin: 2px 0; border-radius: 4px; background: #161b22; font-size: 12px; line-height: 1.6; }
  .tool-icon { flex-shrink: 0; }
  .tool-display-name { color: #ffa657; font-weight: 600; min-width: 50px; }
  .tool-summary { color: #8b949e; word-break: break-all; }
  .bash-viewer { background: #1a1e24; border: 1px solid #30363d; border-radius: 4px; padding: 6px 10px; margin: 4px 0; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; color: #e6edf3; }
  .session-summary-bar { display: flex; gap: 16px; padding: 8px 16px; background: #161b22; border-bottom: 1px solid #21262d; font-size: 12px; color: #8b949e; flex-wrap: wrap; position: sticky; top: 0; z-index: 5; }
  .session-summary-bar span { white-space: nowrap; }
  .cost-bar { display: flex; height: 3px; border-radius: 2px; overflow: hidden; margin: 2px 0 6px 0; }
  .cost-bar .seg-thinking { background: #a371f7; }
  .cost-bar .seg-input { background: #58a6ff; }
  .cost-bar .seg-output { background: #3fb950; }
  .thinking-summary { font-size: 12px; color: #8b949e; font-style: italic; margin: 2px 0; cursor: pointer; }
  .thinking-summary:hover { color: #c9d1d9; }
  .context-panel { border: 1px solid #21262d; border-radius: 6px; margin: 8px 0; background: #161b22; }
  .context-header { padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: 600; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
  .context-header:hover { color: #c9d1d9; }
  .context-body { display: none; padding: 0 12px 12px; }
  .context-body.open { display: block; }
  .context-section { margin: 8px 0; }
  .context-section-title { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .context-pre { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 8px; font-family: 'SF Mono', Menlo, monospace; font-size: 11px; white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow-y: auto; color: #c9d1d9; }
  .auth-reveal { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; color: #8b949e; }
  .auth-reveal:hover { color: #c9d1d9; border-color: #58a6ff; }
  .tool-def-list { font-size: 11px; color: #8b949e; max-height: 200px; overflow-y: auto; }
  .tool-def-item { padding: 2px 0; border-bottom: 1px solid #21262d; }
  .tool-def-name { color: #ffa657; font-weight: 600; }
  .tool-def-desc { color: #6e7681; margin-left: 8px; }
</style>
</head>
<body>
<div class="header">
  <h1>Live Sessions</h1>
  <div>
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">Connecting...</span>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="instruments" id="instruments"></div>
<div class="content" id="content">
  <div class="empty-state">
    <h2>No sessions yet</h2>
    <p>Waiting for proxy requests...</p>
  </div>
</div>

<script>
(function() {
  // State
  let sessions = {};         // sessionId -> SessionNode
  let activeSessionId = null;
  let userScrolledUp = false;
  let streamingRequests = {}; // traceId -> { sessionId, thinking, text, toolCalls }
  let expandedCards = {};    // id -> true (persists across re-renders)
  let expandedThinking = {}; // id -> true
  let contextOpen = false;   // context panel state

  // XSS-safe escaping
  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.slice(0, n) + '...' : s;
  }

  function formatCost(c) {
    if (!c || c === 0) return '';
    if (c < 0.01) return '$' + c.toFixed(4);
    return '$' + c.toFixed(3);
  }

  function formatTokens(tin, tout, thinking) {
    var parts = [];
    if (tin) parts.push(tin.toLocaleString() + ' in');
    if (tout) parts.push(tout.toLocaleString() + ' out');
    if (thinking) parts.push(thinking.toLocaleString() + ' think');
    return parts.join(' / ');
  }

  function formatTime(ts) {
    try {
      var d = new Date(ts);
      return d.toLocaleTimeString();
    } catch(e) { return ''; }
  }

  function formatTokenCount(n) {
    if (!n || n === 0) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  // --- New QoL helpers ---

  function parseToolCallDisplay(name, inputJson) {
    var input = {};
    if (typeof inputJson === 'string') {
      try { input = JSON.parse(inputJson); } catch(e) { input = {}; }
    } else if (typeof inputJson === 'object' && inputJson) {
      input = inputJson;
    }
    var icon = '', displayName = '', summary = '';

    if (name === 'Read' || name === 'read_file') {
      icon = '\ud83d\udcd6'; displayName = 'Read';
      summary = input.file_path || input.filePath || '';
    } else if (name === 'Grep') {
      icon = '\ud83d\udd0d'; displayName = 'Grep';
      var pat = input.pattern || '';
      var gpath = input.path || '';
      summary = '"' + pat + '"' + (gpath ? ' in ' + gpath : '');
    } else if (name === 'Glob') {
      icon = '\ud83d\udd0d'; displayName = 'Glob';
      summary = input.pattern || '';
    } else if (name === 'Edit' || name === 'edit_file') {
      icon = '\u270f\ufe0f'; displayName = 'Edit';
      summary = input.file_path || input.filePath || '';
    } else if (name === 'Write' || name === 'write_file') {
      icon = '\ud83d\udcdd'; displayName = 'Write';
      summary = input.file_path || input.filePath || '';
    } else if (name === 'Bash') {
      icon = '\u26a1'; displayName = 'Bash';
      summary = truncate(input.command || '', 100);
    } else if (name === 'Agent') {
      icon = '\ud83e\udd16'; displayName = 'Agent';
      summary = truncate(input.description || input.prompt || '', 80);
    } else if (name === 'AskUserQuestion') {
      icon = '\ud83d\udcac'; displayName = 'Ask';
      summary = input.question || '';
    } else if (name === 'WebFetch') {
      icon = '\ud83c\udf10'; displayName = 'Fetch';
      summary = input.url || '';
    } else if (name === 'WebSearch') {
      icon = '\ud83c\udf10'; displayName = 'Search';
      summary = input.query || '';
    } else if (name === 'Skill') {
      icon = '\ud83c\udfaf'; displayName = 'Skill';
      summary = input.skill || input.name || '';
    } else if (name === 'TaskCreate') {
      icon = '\ud83d\udccb'; displayName = 'Task';
      summary = input.subject || '';
    } else if (name === 'TaskUpdate') {
      icon = '\ud83d\udccb'; displayName = 'Task';
      summary = '#' + (input.taskId || '?') + (input.status ? ' \u2192 ' + input.status : '');
    } else if (name === 'LSP') {
      icon = '\ud83d\udd17'; displayName = 'LSP';
      summary = (input.operation || '') + ' ' + (input.filePath || '') + (input.line ? ':' + input.line : '');
    } else if (name === 'SendMessage') {
      icon = '\ud83d\udcac'; displayName = 'Msg';
      summary = '\u2192 ' + (input.to || '?') + ': ' + truncate(typeof input.message === 'string' ? input.message : '', 60);
    } else if (name && name.indexOf('mcp__') === 0) {
      icon = '\ud83d\udd0c'; displayName = name.replace(/^mcp__/, '').replace(/__/g, '.').replace(/_/g, ' ');
      displayName = truncate(displayName, 30);
      var keys = Object.keys(input);
      summary = keys.length > 0 ? truncate(String(input[keys[0]] || ''), 60) : '';
    } else {
      icon = '\ud83d\udd27'; displayName = name || '?';
      var ukeys = Object.keys(input);
      summary = ukeys.length > 0 ? truncate(String(input[ukeys[0]] || ''), 60) : '';
    }
    return { icon: icon, displayName: displayName, summary: summary };
  }

  function getRequestBadges(req) {
    var badges = [];
    if (!req.toolCalls || !req.toolCalls.length) return badges;
    var seen = {};
    for (var i = 0; i < req.toolCalls.length; i++) {
      var n = req.toolCalls[i].name || '';
      if (n === 'Bash' && !seen.bash) { badges.push({ label: 'bash', color: '#f0883e' }); seen.bash = true; }
      else if ((n === 'Edit' || n === 'edit_file' || n === 'Write' || n === 'write_file') && !seen.edit) { badges.push({ label: 'edit', color: '#a371f7' }); seen.edit = true; }
      else if ((n === 'Read' || n === 'read_file' || n === 'Grep' || n === 'Glob') && !seen.read) { badges.push({ label: 'read', color: '#58a6ff' }); seen.read = true; }
      else if (n === 'Agent' && !seen.agent) { badges.push({ label: 'agent', color: '#3fb950' }); seen.agent = true; }
      else if ((n === 'WebFetch' || n === 'WebSearch') && !seen.web) { badges.push({ label: 'web', color: '#d2a8ff' }); seen.web = true; }
      else if (n === 'LSP' && !seen.lsp) { badges.push({ label: 'lsp', color: '#79c0ff' }); seen.lsp = true; }
      else if (n.indexOf('mcp__') === 0 && !seen.mcp) { badges.push({ label: 'mcp', color: '#f778ba' }); seen.mcp = true; }
    }
    return badges;
  }

  function renderSessionSummary(sess) {
    var allReqs = getAllRequests(sess);
    var totalIn = 0, totalOut = 0, totalThink = 0;
    var toolCounts = {};
    for (var i = 0; i < allReqs.length; i++) {
      var r = allReqs[i];
      totalIn += (r.tokensIn || 0);
      totalOut += (r.tokensOut || 0);
      totalThink += (r.thinkingTokens || 0);
      if (r.toolCalls) {
        for (var t = 0; t < r.toolCalls.length; t++) {
          var tn = r.toolCalls[t].name || '?';
          toolCounts[tn] = (toolCounts[tn] || 0) + 1;
        }
      }
    }
    var topTools = Object.keys(toolCounts).sort(function(a,b) { return toolCounts[b] - toolCounts[a]; }).slice(0, 5);
    var toolStr = topTools.map(function(t) { return t + ':' + toolCounts[t]; }).join('  ');
    var html = '<div class="session-summary-bar">';
    html += '<span>Requests: <b>' + (sess.totalRequests || 0) + '</b></span>';
    html += '<span>Cost: <b>' + formatCost(sess.totalCost) + '</b></span>';
    html += '<span>Tokens: <b>' + formatTokenCount(totalIn) + '</b> in / <b>' + formatTokenCount(totalOut) + '</b> out / <b>' + formatTokenCount(totalThink) + '</b> think</span>';
    if (toolStr) html += '<span>Tools: ' + esc(toolStr) + '</span>';
    html += '</div>';
    return html;
  }

  function renderContextPanel(sess) {
    // Context is now stored at session level (deduped from requests)
    var ctx = sess;
    var firstReq = (sess.requests && sess.requests.length) ? sess.requests[0] : null;
    if (!ctx.systemPrompt && !ctx.toolDefinitions && !firstReq) return '';

    var html = '<div class="context-panel">';
    html += '<div class="context-header" onclick="toggleContext()">';
    html += '<span>Session Context</span><span id="context-arrow">' + (contextOpen ? '\u25bc' : '\u25b6') + '</span>';
    html += '</div>';
    html += '<div class="context-body' + (contextOpen ? ' open' : '') + '" id="context-body">';

    // System prompt (from session node)
    if (ctx.systemPrompt) {
      html += '<div class="context-section">';
      html += '<div class="context-section-title">System Prompt (' + ctx.systemPrompt.length + ' chars)</div>';
      html += '<div class="context-pre">' + esc(ctx.systemPrompt) + '</div>';
      html += '</div>';
    }

    // Model config (from session or latest request)
    var configParts = [];
    var model = firstReq ? (firstReq.model || firstReq.routedModel) : '';
    if (model) configParts.push('Model: ' + model);
    if (ctx.maxTokens) configParts.push('Max tokens: ' + ctx.maxTokens);
    if (ctx.thinkingConfig) configParts.push('Thinking: ' + ctx.thinkingConfig);
    if (configParts.length) {
      html += '<div class="context-section">';
      html += '<div class="context-section-title">Model Config</div>';
      html += '<div class="context-pre">' + esc(configParts.join('\n')) + '</div>';
      html += '</div>';
    }

    // Tools list (from session node)
    if (ctx.toolDefinitions && ctx.toolDefinitions.length) {
      html += '<div class="context-section">';
      html += '<div class="context-section-title">Tools (' + ctx.toolDefinitions.length + ')</div>';
      html += '<div class="tool-def-list">';
      for (var i = 0; i < ctx.toolDefinitions.length; i++) {
        var td = ctx.toolDefinitions[i];
        html += '<div class="tool-def-item"><span class="tool-def-name">' + esc(td.name || '') + '</span>';
        if (td.description) html += '<span class="tool-def-desc">' + esc(truncate(td.description, 80)) + '</span>';
        html += '</div>';
      }
      html += '</div></div>';
    }

    // Auth (from session node)
    if (ctx.authType || ctx.authKeyPreview) {
      var fullKey = ctx.authKeyPreview || '';
      var maskedKey = fullKey.length > 16 ? fullKey.slice(0, 12) + '****...' + fullKey.slice(-4) : '****';
      html += '<div class="context-section">';
      html += '<div class="context-section-title">Authentication</div>';
      html += '<span style="color:#8b949e;font-size:12px">' + esc(ctx.authType || 'API Key') + ' </span>';
      html += '<span id="auth-masked" style="font-family:monospace;font-size:12px;color:#c9d1d9">' + esc(maskedKey) + '</span> ';
      html += '<span class="auth-reveal" onclick="revealAuth(this)" data-key="' + esc(fullKey) + '">show</span> ';
      html += '<span class="auth-reveal" onclick="copyAuth(this)" data-key="' + esc(fullKey) + '">copy</span>';
      html += '</div>';
    }

    // Token rotation stats (loaded async)
    html += '<div class="context-section" id="token-rotation-section"></div>';

    html += '</div></div>';
    return html;
  }

  function getAllRequests(sess) {
    var reqs = [];
    if (sess.requests) {
      for (var i = 0; i < sess.requests.length; i++) reqs.push(sess.requests[i]);
    }
    if (sess.children) {
      for (var c = 0; c < sess.children.length; c++) {
        var child = sess.children[c];
        if (child.requests) {
          for (var j = 0; j < child.requests.length; j++) reqs.push(child.requests[j]);
        }
      }
    }
    return reqs;
  }

  // UI interaction handlers
  window.toggleThinking = function(id) {
    expandedThinking[id] = !expandedThinking[id];
    var el = document.getElementById('thinking-full-' + id);
    var summary = document.getElementById('thinking-summary-' + id);
    if (el && summary) {
      el.style.display = expandedThinking[id] ? 'block' : 'none';
      summary.style.display = expandedThinking[id] ? 'none' : 'block';
    }
  };

  window.toggleContext = function() {
    contextOpen = !contextOpen;
    var body = document.getElementById('context-body');
    var arrow = document.getElementById('context-arrow');
    if (body) {
      if (contextOpen) body.classList.add('open'); else body.classList.remove('open');
      if (arrow) arrow.textContent = contextOpen ? '\u25bc' : '\u25b6';
    }
  };

  window.copyAuth = function(btn) {
    var key = btn.getAttribute('data-key');
    if (key && navigator.clipboard) {
      navigator.clipboard.writeText(key).then(function() {
        btn.textContent = 'copied!';
        setTimeout(function() { btn.textContent = 'copy'; }, 2000);
      });
    }
  };

  window.revealAuth = function(btn) {
    var key = btn.getAttribute('data-key');
    var masked = document.getElementById('auth-masked');
    if (key && masked) {
      var isRevealed = btn.textContent === 'hide';
      if (isRevealed) {
        masked.textContent = key.length > 16 ? key.slice(0, 12) + '****...' + key.slice(-4) : '****';
        btn.textContent = 'show';
      } else {
        masked.textContent = key;
        btn.textContent = 'hide';
      }
    }
  };

  // --- Rendering ---

  function renderTabs() {
    var tabsEl = document.getElementById('tabs');
    var html = '';
    var ids = Object.keys(sessions).sort(function(a, b) {
      var sa = sessions[a], sb = sessions[b];
      if (sa.isActive !== sb.isActive) return sa.isActive ? -1 : 1;
      return (sb.lastSeenAt || 0) - (sa.lastSeenAt || 0);
    });
    for (var i = 0; i < ids.length; i++) {
      var s = sessions[ids[i]];
      var isActive = activeSessionId === ids[i];
      var dotClass = s.isActive ? 'tab-dot active' : 'tab-dot';
      html += '<div class="tab' + (isActive ? ' active' : '') + '" data-sid="' + esc(ids[i]) + '">'
        + '<span class="' + dotClass + '"></span>'
        + esc(truncate(ids[i], 16))
        + ' <span style="color:#8b949e;font-size:11px">(' + (s.totalRequests || 0) + ' reqs, ' + formatCost(s.totalCost) + ')</span>'
        + '</div>';
    }
    tabsEl.innerHTML = html;

    // Attach click handlers
    var tabEls = tabsEl.querySelectorAll('.tab');
    for (var j = 0; j < tabEls.length; j++) {
      tabEls[j].addEventListener('click', function() {
        activeSessionId = this.getAttribute('data-sid');
        renderTabs();
        renderContent();
      });
    }
  }

  function renderCostBar(req) {
    var tin = req.tokensIn || 0;
    var tout = req.tokensOut || 0;
    var tthink = req.thinkingTokens || 0;
    var total = tin + tout + tthink;
    if (total === 0) return '';
    var pThink = (tthink / total * 100).toFixed(1);
    var pIn = (tin / total * 100).toFixed(1);
    var pOut = (tout / total * 100).toFixed(1);
    return '<div class="cost-bar" style="margin:0 14px">'
      + '<div class="seg-thinking" style="width:' + pThink + '%"></div>'
      + '<div class="seg-input" style="width:' + pIn + '%"></div>'
      + '<div class="seg-output" style="width:' + pOut + '%"></div>'
      + '</div>';
  }

  function renderToolCallRich(tc) {
    var inputData = tc.inputFull || tc.inputPreview || '';
    var parsed = parseToolCallDisplay(tc.name, inputData);
    return '<div class="tool-call-rich">'
      + '<span class="tool-icon">' + parsed.icon + '</span>'
      + '<span class="tool-display-name">' + esc(parsed.displayName) + '</span>'
      + '<span class="tool-summary">' + esc(parsed.summary) + '</span>'
      + '</div>';
  }

  function renderThinkingBlock(req, isStreaming) {
    var id = req.id || '';
    var thinkingText = req.thinkingContent || '';
    if (!thinkingText && !isStreaming) return '';

    if (isStreaming) {
      var streamClass = ' streaming';
      var html = '<div class="thinking-block' + streamClass + '" id="thinking-' + esc(id) + '">';
      html += '<div class="thinking-label">Thinking</div>';
      html += '<div class="thinking-text" id="thinking-text-' + esc(id) + '">' + esc(thinkingText);
      html += '<span class="streaming-indicator"></span>';
      html += '</div></div>';
      return html;
    }

    // Non-streaming: show summary + expandable full text
    var firstSentence = thinkingText.split(/[.!?\n]/)[0] || '';
    firstSentence = truncate(firstSentence.trim(), 120);

    var thinkingExpanded = !!expandedThinking[id];
    var html = '<div class="thinking-summary" id="thinking-summary-' + esc(id) + '" onclick="toggleThinking('' + esc(id) + '')" style="display:' + (thinkingExpanded ? 'none' : 'block') + '">';
    html += '\ud83d\udcad ' + esc(firstSentence) + (thinkingText.length > firstSentence.length ? '...' : '');
    html += '</div>';
    html += '<div class="thinking-block" id="thinking-full-' + esc(id) + '" style="display:' + (thinkingExpanded ? 'block' : 'none') + '">';
    html += '<div class="thinking-label">Thinking</div>';
    html += '<div class="thinking-text">' + esc(thinkingText) + '</div>';
    html += '</div>';
    return html;
  }

  function renderRequestCard(req, isStreaming) {
    var id = req.id || '';
    var expanded = isStreaming || !!expandedCards[id];
    var html = '<div class="request-card" id="card-' + esc(id) + '">';
    html += '<div class="request-header" onclick="toggleExpand(this)">';
    html += '<span class="req-time">' + esc(formatTime(req.timestamp)) + '</span>';
    html += '<span class="req-model">' + esc(req.model || req.routedModel || '?') + '</span>';

    // Badges
    var badges = getRequestBadges(req);
    for (var b = 0; b < badges.length; b++) {
      html += '<span class="badge" style="background:' + badges[b].color + '">' + esc(badges[b].label) + '</span>';
    }

    html += '<span class="req-message">' + esc(truncate(req.userMessage, 80)) + '</span>';
    if (req.costUsd) html += '<span class="req-cost">' + esc(formatCost(req.costUsd)) + '</span>';
    var tokStr = formatTokens(req.tokensIn, req.tokensOut, req.thinkingTokens);
    if (tokStr) html += '<span class="req-tokens">' + esc(tokStr) + '</span>';
    if (req.error) html += '<span class="req-error"> ERR</span>';
    html += '</div>';

    // Cost bar
    html += renderCostBar(req);

    // Thinking block
    html += renderThinkingBlock(req, isStreaming);

    // Expandable: response + tools
    html += '<div class="expandable' + (expanded ? ' open' : '') + '" id="expand-' + esc(id) + '">';
    if (req.responseText) {
      html += '<div class="response-block"><div class="response-text" id="response-text-' + esc(id) + '">' + esc(req.responseText) + '</div></div>';
    }
    if (req.toolCalls && req.toolCalls.length) {
      for (var t = 0; t < req.toolCalls.length; t++) {
        html += renderToolCallRich(req.toolCalls[t]);
      }
    }
    html += '</div>';
    html += '</div>';
    return html;
  }

  function renderInstruments() {
    var el = document.getElementById('instruments');
    if (!el || !activeSessionId || !sessions[activeSessionId]) {
      if (el) el.innerHTML = '';
      return;
    }
    var sess = sessions[activeSessionId];
    var reqs = getAllRequests(sess);
    if (reqs.length === 0) { el.innerHTML = ''; return; }

    // Latest request is the last in the array (newest appended at end)
    var lastReq = reqs[reqs.length - 1];
    var totalCost = sess.totalCost || 0;
    var totalIn = 0, totalOut = 0, totalThinking = 0, totalCacheRead = 0, totalCacheCreate = 0;
    var now = Date.now();
    var recentCost = 0;

    for (var i = 0; i < reqs.length; i++) {
      var r = reqs[i];
      totalIn += r.tokensIn || 0;
      totalOut += r.tokensOut || 0;
      totalThinking += r.thinkingTokens || 0;
      totalCacheRead += r.cacheReadTokens || 0;
      totalCacheCreate += r.cacheCreationTokens || 0;
      var reqTime = new Date(r.timestamp).getTime();
      if (now - reqTime < 60000) recentCost += r.costUsd || 0;
    }

    // Context gauge (latest request tokensIn = total context sent)
    var contextTokens = lastReq.tokensIn || 0;
    var contextPct = Math.min(contextTokens / 1000000 * 100, 100);
    var contextColor = contextPct < 50 ? 'green' : contextPct < 80 ? 'yellow' : 'red';

    // Cache rate
    var cacheRate = totalIn > 0 ? (totalCacheRead / totalIn * 100) : 0;
    var cacheSavings = totalCacheRead / 1000000 * 15 * 0.9;

    // Thinking
    var lastThinking = lastReq.thinkingTokens || 0;
    var avgThinking = reqs.length > 0 ? Math.round(totalThinking / reqs.length) : 0;

    // Throughput
    var lastTokPerSec = lastReq.latencyMs > 0 ? Math.round((lastReq.tokensOut || 0) / (lastReq.latencyMs / 1000)) : 0;
    var avgLatency = 0;
    for (var j = 0; j < reqs.length; j++) avgLatency += reqs[j].latencyMs || 0;
    avgLatency = reqs.length > 0 ? Math.round(avgLatency / reqs.length / 1000 * 10) / 10 : 0;

    var html = '';

    // Context gauge
    html += '<div class="gauge">';
    html += '<div class="gauge-label">\ud83d\udcca Context Window</div>';
    html += '<div class="gauge-value">' + contextPct.toFixed(1) + '% of 1M</div>';
    html += '<div class="gauge-detail">' + formatTokenCount(contextTokens) + ' input tokens (last req)</div>';
    html += '<div class="gauge-bar"><div class="gauge-bar-fill ' + contextColor + '" style="width:' + contextPct + '%"></div></div>';
    html += '</div>';

    // Cost velocity
    html += '<div class="gauge">';
    html += '<div class="gauge-label">\ud83d\udcb0 Cost</div>';
    html += '<div class="gauge-value">$' + recentCost.toFixed(3) + '/min</div>';
    html += '<div class="gauge-detail">Session total: $' + totalCost.toFixed(4) + '</div>';
    html += '</div>';

    // Cache rate
    html += '<div class="gauge">';
    html += '<div class="gauge-label">\ud83d\udcbe Cache</div>';
    html += '<div class="gauge-value">' + cacheRate.toFixed(0) + '% hit rate</div>';
    html += '<div class="gauge-detail">Saved ~$' + cacheSavings.toFixed(3) + ' \u00b7 ' + formatTokenCount(totalCacheRead) + ' cached</div>';
    html += '<div class="gauge-bar"><div class="gauge-bar-fill green" style="width:' + Math.min(cacheRate, 100) + '%"></div></div>';
    html += '</div>';

    // Thinking
    html += '<div class="gauge">';
    html += '<div class="gauge-label">\ud83e\udde0 Thinking</div>';
    html += '<div class="gauge-value">' + formatTokenCount(lastThinking) + ' last req</div>';
    html += '<div class="gauge-detail">Avg: ' + formatTokenCount(avgThinking) + '/req \u00b7 Total: ' + formatTokenCount(totalThinking) + '</div>';
    html += '</div>';

    // Throughput
    html += '<div class="gauge">';
    html += '<div class="gauge-label">\u26a1 Throughput</div>';
    html += '<div class="gauge-value">' + lastTokPerSec + ' tok/s</div>';
    html += '<div class="gauge-detail">Avg latency: ' + avgLatency + 's \u00b7 ' + reqs.length + ' requests</div>';
    html += '</div>';

    el.innerHTML = html;
  }

  function renderContent() {
    renderInstruments();
    var contentEl = document.getElementById('content');
    if (!activeSessionId || !sessions[activeSessionId]) {
      contentEl.innerHTML = '<div class="empty-state"><h2>No sessions yet</h2><p>Waiting for proxy requests...</p></div>';
      return;
    }
    var sess = sessions[activeSessionId];
    var html = '';

    // Context panel at top
    html += renderContextPanel(sess);

    // Session summary bar
    html += renderSessionSummary(sess);

    // Streaming requests first (active, happening right now)
    var streamIds = Object.keys(streamingRequests);
    for (var si = 0; si < streamIds.length; si++) {
      var sr = streamingRequests[streamIds[si]];
      if (sr.sessionId === activeSessionId && !sr.parentTraceId) {
        html += renderRequestCard({
          id: streamIds[si],
          timestamp: sr.timestamp || new Date().toISOString(),
          model: sr.model || '',
          userMessage: sr.userMessage || '',
          thinkingContent: sr.thinking || '',
          responseText: sr.text || '',
          toolCalls: sr.toolCalls || [],
          tokensIn: 0, tokensOut: 0, thinkingTokens: 0, costUsd: 0
        }, true);
      }
    }

    // Main agent requests (newest first)
    if (sess.requests && sess.requests.length) {
      for (var i = sess.requests.length - 1; i >= 0; i--) {
        html += renderRequestCard(sess.requests[i], false);
      }
    }

    // Subagent groups (newest first within each group)
    if (sess.children && sess.children.length) {
      for (var c = 0; c < sess.children.length; c++) {
        var child = sess.children[c];
        html += '<div class="subagent-group">';
        html += '<div class="subagent-label">' + esc(child.agentLabel || 'Subagent') + '</div>';
        // Streaming subagent requests first
        for (var si2 = 0; si2 < streamIds.length; si2++) {
          var sr2 = streamingRequests[streamIds[si2]];
          if (sr2.sessionId === activeSessionId && sr2.parentTraceId && sr2.agentFingerprint === child.agentFingerprint) {
            html += renderRequestCard({
              id: streamIds[si2],
              timestamp: sr2.timestamp || new Date().toISOString(),
              model: sr2.model || '',
              userMessage: sr2.userMessage || '',
              thinkingContent: sr2.thinking || '',
              responseText: sr2.text || '',
              toolCalls: sr2.toolCalls || [],
              tokensIn: 0, tokensOut: 0, thinkingTokens: 0, costUsd: 0
            }, true);
          }
        }
        // Then completed requests (newest first)
        if (child.requests) {
          for (var r = child.requests.length - 1; r >= 0; r--) {
            html += renderRequestCard(child.requests[r], false);
          }
        }
        html += '</div>';
      }
    }

    contentEl.innerHTML = html;
    maybeAutoScroll();
  }

  // Toggle expand for response/tool sections (persists across re-renders)
  window.toggleExpand = function(headerEl) {
    var card = headerEl.parentElement;
    var id = card ? card.id.replace('card-', '') : '';
    if (id) expandedCards[id] = !expandedCards[id];
    var expandable = card.querySelector('.expandable');
    if (expandable) {
      if (expandedCards[id]) expandable.classList.add('open'); else expandable.classList.remove('open');
    }
  };

  // --- Auto-scroll ---
  function setupAutoScroll() {
    var contentEl = document.getElementById('content');
    contentEl.addEventListener('scroll', function() {
      var el = this;
      var atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
      userScrolledUp = !atBottom;
    });
  }

  function maybeAutoScroll() {
    if (userScrolledUp) return;
    var contentEl = document.getElementById('content');
    contentEl.scrollTop = contentEl.scrollHeight;
  }

  // --- In-place streaming updates (avoid full re-render) ---
  function updateStreamingThinking(traceId, text) {
    var el = document.getElementById('thinking-text-' + traceId);
    if (el) {
      el.innerHTML = esc(text) + '<span class="streaming-indicator"></span>';
      maybeAutoScroll();
      return true;
    }
    return false;
  }

  function updateStreamingResponse(traceId, text) {
    var el = document.getElementById('response-text-' + traceId);
    if (el) {
      el.textContent = text;
      maybeAutoScroll();
      return true;
    }
    return false;
  }

  // --- SSE Connection ---
  function connectSSE() {
    var evtSource = new EventSource('/api/live/events');

    evtSource.addEventListener('connected', function(e) {
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('statusLabel').textContent = 'Connected';
    });

    evtSource.addEventListener('heartbeat', function(e) {
      // Keep-alive, no action needed
    });

    evtSource.addEventListener('token.rotated', function(e) {
      var data = JSON.parse(e.data);
      tokenRotations.push(data);
      loadTokenStats();
    });

    evtSource.addEventListener('stream.start', function(e) {
      var data = JSON.parse(e.data);
      var traceId = data.traceId || data.id;
      streamingRequests[traceId] = {
        sessionId: data.sessionId || '',
        model: data.model || '',
        userMessage: data.userMessage || '',
        parentTraceId: data.parentTraceId || null,
        agentFingerprint: data.agentFingerprint || '',
        timestamp: data.timestamp || new Date().toISOString(),
        thinking: '',
        text: '',
        toolCalls: []
      };
      // Auto-select session if none selected
      if (!activeSessionId && data.sessionId) {
        activeSessionId = data.sessionId;
      }
      renderTabs();
      renderContent();
    });

    evtSource.addEventListener('stream.thinking', function(e) {
      var data = JSON.parse(e.data);
      var traceId = data.traceId || data.id;
      var sr = streamingRequests[traceId];
      if (sr) {
        sr.thinking += (data.text || data.content || '');
        if (!updateStreamingThinking(traceId, sr.thinking)) {
          renderContent();
        }
      }
    });

    evtSource.addEventListener('stream.text', function(e) {
      var data = JSON.parse(e.data);
      var traceId = data.traceId || data.id;
      var sr = streamingRequests[traceId];
      if (sr) {
        sr.text += (data.text || data.content || '');
        if (!updateStreamingResponse(traceId, sr.text)) {
          renderContent();
        }
      }
    });

    evtSource.addEventListener('stream.tool_call', function(e) {
      var data = JSON.parse(e.data);
      var traceId = data.traceId || data.id;
      var sr = streamingRequests[traceId];
      if (sr) {
        sr.toolCalls.push({
          name: data.name || '?',
          inputPreview: data.inputPreview || data.input || '',
          inputFull: data.inputFull || data.input || data.inputPreview || ''
        });
        renderContent();
      }
    });

    evtSource.addEventListener('stream.end', function(e) {
      var data = JSON.parse(e.data);
      var traceId = data.traceId || data.id;
      delete streamingRequests[traceId];
      renderInstruments();
      // session.updated or request.captured will provide the final data
    });

    evtSource.addEventListener('request.captured', function(e) {
      var data = JSON.parse(e.data);
      var sid = data.sessionId;
      if (!sessions[sid]) {
        sessions[sid] = {
          sessionId: sid, agentFingerprint: '', agentLabel: 'Main Agent',
          parentTraceId: null, children: [], requests: [],
          isActive: true, totalCost: 0, totalRequests: 0, lastSeenAt: Date.now()
        };
      }
      var sess = sessions[sid];
      if (data.parentTraceId) {
        var child = null;
        for (var i = 0; i < sess.children.length; i++) {
          if (sess.children[i].agentFingerprint === data.agentFingerprint) {
            child = sess.children[i]; break;
          }
        }
        if (!child) {
          child = {
            sessionId: sid, agentFingerprint: data.agentFingerprint || '',
            agentLabel: 'Subagent ' + (sess.children.length + 1),
            parentTraceId: data.parentTraceId, children: [], requests: [],
            isActive: true, totalCost: 0, totalRequests: 0, lastSeenAt: Date.now()
          };
          sess.children.push(child);
        }
        child.requests.push(data);
        child.totalCost += (data.costUsd || 0);
        child.totalRequests++;
        child.lastSeenAt = Date.now();
      } else {
        sess.requests.push(data);
      }
      sess.totalCost += (data.costUsd || 0);
      sess.totalRequests++;
      sess.lastSeenAt = Date.now();
      sess.isActive = true;

      if (!activeSessionId) activeSessionId = sid;
      renderTabs();
      renderContent();
    });

    evtSource.addEventListener('session.updated', function(e) {
      var data = JSON.parse(e.data);
      if (data.sessionId && data.tree) {
        sessions[data.sessionId] = data.tree;
        renderTabs();
        if (activeSessionId === data.sessionId) renderContent();
      }
    });

    evtSource.onerror = function() {
      document.getElementById('statusDot').classList.remove('connected');
      document.getElementById('statusLabel').textContent = 'Disconnected — reconnecting...';
    };

    evtSource.onopen = function() {
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('statusLabel').textContent = 'Connected';
    };
  }

  // --- Load existing sessions ---
  function loadSessions() {
    fetch('/api/sessions').then(function(r) { return r.json(); }).then(function(data) {
      var list = Array.isArray(data) ? data : (data && Array.isArray(data.sessions) ? data.sessions : []);
      if (list.length > 0) {
        for (var i = 0; i < list.length; i++) {
          var s = list[i];
          if (s.sessionId) sessions[s.sessionId] = s;
        }
        if (!activeSessionId && list[0].sessionId) {
          activeSessionId = list[0].sessionId;
        }
        renderTabs();
        renderContent();
      }
    }).catch(function() {
      // Sessions API may not be ready yet
    });
  }

  // --- Token rotation display ---
  var tokenRotations = [];

  function loadTokenStats() {
    fetch('/api/token-stats').then(function(r) { return r.json(); }).then(function(d) {
      var el = document.getElementById('token-rotation-section');
      if (!el) return;
      var html = '<div class="context-section-title">Token Rotation</div>';
      html += '<div style="font-size:12px;color:#8b949e">';
      html += 'Current token age: <strong style="color:#c9d1d9">' + esc(d.currentTokenAge || '?') + '</strong>';
      html += ' · Requests: <strong style="color:#c9d1d9">' + (d.currentTokenRequests || 0) + '</strong>';
      html += ' · Rotations: <strong style="color:#c9d1d9">' + (d.totalRotations || 0) + '</strong>';
      if (d.averageRotation) {
        html += ' · Avg interval: <strong style="color:#c9d1d9">' + esc(d.averageRotation) + '</strong>';
      }
      html += '</div>';
      if (d.rotationHistory && d.rotationHistory.length > 0) {
        html += '<div style="margin-top:6px;font-size:11px;max-height:150px;overflow-y:auto">';
        for (var i = d.rotationHistory.length - 1; i >= 0; i--) {
          var r = d.rotationHistory[i];
          html += '<div style="padding:2px 0;border-bottom:1px solid #21262d;color:#8b949e">';
          html += '<span style="color:#f0883e">↻</span> ';
          html += esc(r.token) + ' · lived <strong>' + esc(r.duration) + '</strong> · ' + r.requests + ' reqs';
          html += ' <span style="color:#6e7681">(' + esc(new Date(r.firstSeen).toLocaleTimeString()) + ')</span>';
          html += '</div>';
        }
        html += '</div>';
      }
      // Show live rotation events
      if (tokenRotations.length > 0) {
        html += '<div style="margin-top:6px">';
        for (var j = tokenRotations.length - 1; j >= 0; j--) {
          var evt = tokenRotations[j];
          html += '<div style="padding:3px 0;font-size:11px;color:#3fb950">';
          html += '<strong>↻ ROTATED</strong> ' + esc(evt.oldToken) + ' → ' + esc(evt.newToken);
          html += ' (lived ' + esc(evt.oldDuration) + ', ' + evt.oldRequests + ' reqs)';
          html += ' <span style="color:#6e7681">' + esc(new Date(evt.timestamp).toLocaleTimeString()) + '</span>';
          html += '</div>';
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }).catch(function() {});
  }

  // --- Init ---
  setupAutoScroll();
  loadSessions();
  loadTokenStats();
  setInterval(loadTokenStats, 10000);
  connectSSE();
})();
</script>
</body>
</html>
